version: 2

models:
  - name: fct_orders
    description: "{{ doc('fct_orders_cleansed') }}"
    columns:
      - name: order_id
        description: "Identificador único de la orden de compra (PK)."
        tests:
          - unique:
              config: {tags: ['business_package']}
          - not_null:
              config: {tags: ['business_package']}

      - name: customer_id
        description: "Llave foránea que conecta con la dimensión de clientes (FK)."
        tests:
          - not_null:
              config: {tags: ['business_package']}
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
              config: {tags: ['business_package']}

      - name: nombre_cliente
        description: "Nombre del cliente consolidado para facilitar el reporte directo."

      - name: segmento_cliente
        description: "Segmento de mercado del cliente asociado al pedido."

      - name: order_date
        description: "Fecha en la que se realizó el pedido."

      - name: estado_pedido
        description: "Estado actual de la orden (O: Open, F: Finished, P: Pending)."

      - name: importe_total
        description: "Monto total bruto de la transacción en moneda local."
        tests:
          - not_null:
              config: {tags: ['business_package']}
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: 
                min_value: 0
              config: {tags: ['business_package']}

      - name: categoria_venta
        description: "Clasificación del importe calculada mediante la macro categorizar_importe."

      - name: total_piezas
        description: "Cantidad total de artículos contenidos en el pedido."

      - name: total_proveedores_distintos
        description: "Número de proveedores únicos que participan en el pedido."

      - name: pieza_ejemplo
        description: "Nombre de una pieza representativa incluida en el pedido."
        tests:
          - not_null:
              config: {tags: ['business_package']}

      - name: proveedor_principal
        description: "Nombre del proveedor con mayor relevancia en este pedido."
        tests:
          - not_null:
              config: {tags: ['business_package']}

  - name: dim_customers
    description: "{{ doc('dim_customers_cleansed') }}"
    columns:
      - name: customer_id
        description: "Llave primaria única del cliente."
        tests:
          - unique: {config: {tags: ['business_package']}}
          - not_null: {config: {tags: ['business_package']}}
      - name: nombre_cliente
        description: "Nombre completo o razón social del cliente."
      - name: segmento_mercado
        description: "Categorización comercial del cliente (ej. AUTOMOBILE, BUILDING)."
      - name: direccion_formateada
        description: "Dirección del cliente normalizada en mayúsculas."

  - name: dim_parts
    description: "{{ doc('dim_parts_cleansed') }}"
    columns:
      - name: part_id
        description: "Identificador único de la pieza o producto."
        tests:
          - unique: {config: {tags: ['business_package']}}
          - not_null: {config: {tags: ['business_package']}}
      - name: nombre_pieza
        description: "Nombre descriptivo del artículo."
      - name: fabricante
        description: "Nombre de la empresa manufacturera."
      - name: marca
        description: "Marca comercial del producto."
      - name: tipo_pieza
        description: "Categoría técnica de la pieza."
      - name: tamano
        description: "Dimensiones o talla de la pieza."
      - name: precio_minorista
        description: "Precio de venta al público recomendado."

  - name: dim_suppliers
    description: "{{ doc('dim_suppliers_cleansed') }}"
    columns:
      - name: supplier_id
        description: "Identificador único del proveedor."
        tests:
          - unique: {config: {tags: ['business_package']}}
          - not_null: {config: {tags: ['business_package']}}
      - name: nombre_proveedor
        description: "Nombre legal de la entidad proveedora."
      - name: direccion
        description: "Ubicación física del proveedor."
      - name: telefono
        description: "Número de contacto principal."
      - name: balance_cuenta
        description: "Saldo pendiente o crédito disponible con el proveedor."