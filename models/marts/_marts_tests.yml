version: 2

models:
  - name: fct_orders
    description: "Tabla de hechos central que consolida pedidos con métricas agregadas de negocio."
    columns:
      - name: order_id
        description: "Identificador único de la orden de compra."
        tests:
          - unique:
              config: {tags: ['business_package']}
          - not_null:
              config: {tags: ['business_package']}

      - name: customer_id
        description: "Llave foránea que conecta con la dimensión de clientes."
        tests:
          - not_null:
              config: {tags: ['business_package']}
          - relationships:
              to: ref('dim_customers')
              field: customer_id
              config: {tags: ['business_package']}

      - name: importe_total
        description: "Monto total bruto de la transacción en la moneda local."
        tests:
          - not_null:
              config: {tags: ['business_package']}
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              config: {tags: ['business_package']}

      - name: pieza_ejemplo
        description: "Nombre o descripción de una de las piezas incluidas en el pedido (vía int_pedidos_clientes)."
        tests:
          - not_null:
              config: {tags: ['business_package']}

      - name: proveedor_principal
        description: "Nombre del proveedor con mayor peso o representación en el pedido."
        tests:
          - not_null:
              config: {tags: ['business_package']}

  - name: dim_customers
    description: "Dimensión maestra de clientes con datos demográficos y de segmentación."
    columns:
      - name: customer_id
        description: "Llave primaria única del cliente."
        tests:
          - unique:
              config: {tags: ['business_package']}
          - not_null:
              config: {tags: ['business_package']}

  - name: dim_parts
    description: "Catálogo completo de piezas con detalles técnicos y precios de venta."
    columns:
      - name: part_id
        description: "Identificador único de la pieza o producto."
        tests:
          - unique:
              config: {tags: ['business_package']}

  - name: dim_suppliers
    description: "Directorio de proveedores con información de contacto y balance de cuenta."
    columns:
      - name: supplier_id
        description: "Identificador único del proveedor."
        tests:
          - unique:
              config: {tags: ['business_package']}