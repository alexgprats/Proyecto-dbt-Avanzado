version: 2

models:
  - name: stg_orders
    description: "Tabla incremental con los pedidos base de Snowflake"
    columns:
      - name: order_id
        description: "Clave primaria del pedido"
        tests:
          - unique:
              config:
                tags: ['staging_package']
          - not_null:
              config:
                tags: ['staging_package']
      - name: status
        description: "Estado del pedido (F, O, P)"
        tests:
          - accepted_values:
              values: ['F', 'O', 'P']
              config:
                tags: ['staging_package']

  - name: stg_customers
    description: "Listado de clientes"
    columns:
      - name: customer_id
        tests:
          - unique:
              config:
                tags: ['staging_package']
          - not_null:
              config:
                tags: ['staging_package']
    
  - name: stg_lineitems
    description: "Detalle de cada línea de pedido"
    columns:
      - name: order_id
        tests:
          - not_null:
              config:
                tags: ['staging_package']
      - name: part_id
        tests:
          - not_null:
              config:
                tags: ['staging_package']

  - name: stg_parts
    description: "Maestro de piezas/productos"
    columns:
      - name: part_id
        tests:
          - unique:
              config:
                tags: ['staging_package']
          - not_null:
              config:
                tags: ['staging_package']

  - name: stg_suppliers
    description: "Maestro de proveedores"
    columns:
      - name: supplier_id
        tests:
          - unique:
              config:
                tags: ['staging_package']
          - not_null:
              config:
                tags: ['staging_package']